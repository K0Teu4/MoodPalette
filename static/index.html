<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>MoodPalette</title>

    <link
        rel="stylesheet"
        href="/static/style.css"
    >

</head>

<body>

    <main class="container">

        <h1>MoodPalette</h1>

        <div class="input-container">

            <textarea
                id="prompt"
                placeholder="меланхоличный осенний вечер"
            ></textarea>

            <button id="generate">

                Сгенерировать

            </button>

        </div>

        <details class="settings">

            <summary>

                Настройки

            </summary>

            <div class="setting-row">

                <label>

                    Схема

                </label>

                <select id="scheme">

                    <option value="default">

                        Default

                    </option>

                    <option value="monochromatic">

                        Monochromatic

                    </option>

                    <option value="complementary">

                        Complementary

                    </option>

                    <option value="triadic">

                        Triadic

                    </option>

                </select>

            </div>

            <div class="setting-row">

                <label>

                    Creativity

                </label>

                <input
                    type="range"
                    min="0"
                    max="1"
                    step="0.1"
                    value="0.5"
                    id="creativity"
                >

                <span id="creativity-value">

                    0.5

                </span>

            </div>

        </details>


        <div
            id="palette"
            class="palette"
        ></div>


        <div class="actions">

            <button id="copy-all">

                Copy all HEX

            </button>

            <button id="download">

                Download PNG

            </button>

        </div>


        <section class="history-section">

            <h2>

                History

            </h2>

            <div
                id="history"
                class="history"
            ></div>

        </section>


        <div
            id="toast"
            class="toast"
        >

            Copied

        </div>

    </main>


    <script src="/static/app.js"></script>

</body>

</html>
